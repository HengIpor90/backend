spring.application.name=backend
## Removed JDBC/DataSource/JPA properties to avoid Spring auto-configuring a SQL DataSource.
## Use Spring Data MongoDB via `spring.data.mongodb.uri` instead.
## By default use a local MongoDB instance, or set `MONGODB_URI` env var to override.
spring.data.mongodb.uri=mongodb://localhost:27017/backenddb
spring.data.mongodb.database=backenddb
spring.data.mongodb.auto-index-creation=true
